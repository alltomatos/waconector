name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Least privilege: nenhum job aqui precisa escrever no repositório (só ler código e publicar
# artifact, que não exige permissão própria) — CodeQL sinaliza workflows sem "permissions"
# explícito porque o GITHUB_TOKEN default varia de repo pra repo.
permissions:
  contents: read

jobs:
  guard-main-source:
    # main só recebe merge vindo de develop DESTE repositório (ver CONTRIBUTING.md e a skill
    # waconector). O GitHub não tem uma regra de proteção nativa para "só aceitar PR de um branch
    # específico" — este job é a aplicação técnica dessa regra. Checar só o nome do branch
    # (github.head_ref) não basta: um fork pode ter uma branch chamada literalmente "develop" e
    # passaria no check sem vir do develop real. Por isso também comparamos o repositório de
    # origem do PR (github.event.pull_request.head.repo.full_name) contra este repositório.
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: PRs para main devem vir de develop (deste repositório, não de um fork)
        if: |
          github.head_ref != 'develop' ||
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "PRs para main só são aceitos a partir do develop DESTE repositório. Este PR vem" >&2
            echo "de um fork (${{ github.event.pull_request.head.repo.full_name }}), não de ${{ github.repository }} — rejeitado independente do nome do branch." >&2
            exit 1
          fi
          echo "PRs para main só são aceitos a partir de develop (branch atual: ${{ github.head_ref }})." >&2
          exit 1

  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run smoke
      - name: Falhar se a matriz de capabilities commitada ficou desatualizada
        # Depende de dist/ (mesma ordem de dependência do smoke acima) — roda só 1x, não precisa
        # repetir na matrix Node 20/22.
        if: matrix.node-version == 22
        run: |
          npm run docs:capabilities
          git diff --exit-code -- docs/capabilities.md
      - name: Publicar relatório de cobertura
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  docs-build:
    # Feedback rápido sobre o site de documentação (VitePress) em todo push/PR, sem deploy — não
    # depende de dist/ (docs/capabilities.md já vem commitado; a checagem de que está atualizado é
    # feita no job "ci" acima). O deploy de fato mora em docs-deploy.yml, só em main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:build

  examples-smoke:
    # Feedback rápido de que os exemplos em examples/ ainda instalam e sobem com o MockAdapter.
    # Cada exemplo declara "waconector" como dependência normal do npm registry (mesma experiência
    # de quem copia o exemplo) — não depende de dist/ local. Mesmo espírito do job "docs-build":
    # informativo, não entra em ci-required.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [express, nextjs]
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Sanity check (Express)
        if: matrix.example == 'express'
        run: |
          node --check server.mjs
          node selftest.mjs
      - name: Build (Next.js)
        if: matrix.example == 'nextjs'
        run: npm run build

  ci-required:
    # Jobs com matrix nunca reportam um check chamado exatamente "ci" — o GitHub sempre sufixa
    # com o valor da matrix ("ci (20)", "ci (22)"). Como a branch ruleset exige um check chamado
    # "ci", este job-portão agrega o resultado de toda a matrix sob esse nome exato.
    name: ci
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Falhar se algum job da matrix não passou
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "ci (matrix Node 20/22) não passou: ${{ needs.ci.result }}" >&2
            exit 1
          fi
