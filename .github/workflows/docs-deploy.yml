name: Docs Deploy (GitHub Pages)

# Deploy do site de documentação (VitePress) só a partir de main — main já é a branch que
# release.yml trata como "o que está publicado" (dispara o release no npm); o site de docs segue a
# mesma fonte da verdade, em vez de expor o estado em progresso de develop.
on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Gerar matriz de capabilities a partir do código (depende de dist/)
        run: npm run docs:capabilities
      - run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
